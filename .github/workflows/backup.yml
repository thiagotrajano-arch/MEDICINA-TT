name: Backup e keep-alive

# Backup lógico semanal do Postgres (pg_dump) como artefato + ping para evitar
# a hibernação do Supabase Free (~7 dias ocioso). Custo zero.

on:
  schedule:
    - cron: "0 5 * * 1" # segunda-feira 05:00 UTC
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: pg_dump
        if: ${{ env.SUPABASE_DB_URL != '' }}
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          STAMP=$(date -u +%Y%m%d)
          pg_dump "$SUPABASE_DB_URL" --no-owner --no-privileges -Fc -f "backup_${STAMP}.dump"
          echo "BACKUP_FILE=backup_${STAMP}.dump" >> "$GITHUB_ENV"
      - name: Guardar backup como artefato
        if: ${{ env.BACKUP_FILE != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: db-backup
          path: ${{ env.BACKUP_FILE }}
          retention-days: 90

  keepalive:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - name: Ping Supabase (anti-hibernação)
        if: ${{ env.SUPABASE_URL != '' }}
        run: |
          curl -sS -o /dev/null -w "%{http_code}\n" \
            "${SUPABASE_URL}/rest/v1/disciplina?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" || true
