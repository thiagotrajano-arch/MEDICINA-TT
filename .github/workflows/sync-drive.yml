name: Sync Google Drive

# Sincronização incremental dos materiais do Drive → banco (detecta novos,
# atualizados e removidos). Custo zero (GitHub Actions). Roda no-op seguro
# enquanto os secrets não estiverem configurados.

on:
  schedule:
    - cron: "0 */6 * * *" # a cada 6 horas
  workflow_dispatch: {} # execução manual pela aba Actions

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Rodar sync
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_IDS: ${{ secrets.DRIVE_FOLDER_IDS }}
        run: npx tsx scripts/sync-drive.mts
